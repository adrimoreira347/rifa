<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabla de Números</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Elige tu Número (1 al 100)</h1>
        
        <div class="controls">
            <label for="role">Selecciona tu Rol:</label>
            <select id="role" onchange="toggleAdmin()">
                <option value="player">Jugador</option>
                <option value="admin">Administrador</option>
            </select>
            
            <div id="admin-controls" style="display: none;">
                <input type="password" id="admin-pass" placeholder="Contraseña de Admin">
                <button onclick="resetTable()">Reiniciar Tabla</button>
            </div>
        </div>

        <div id="grid" class="grid"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
